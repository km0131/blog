services:
  # ブログバックエンド (Bun + Hono)
  app:
    build: .
    restart: always
    ports:
      - '3001:3000'
    volumes:
      - ./:/app:z
      - ./data:/app/data:z 
      - /app/node_modules
      - ./data:/app/data:z
    environment:
      - NODE_ENV=development
      # 💡 Bunのプログラムから一発でPostgresに繋げられるように環境変数を追加
      - DATABASE_URL=postgres://blog_user:secure_password@db:5432/blog_db
    command: ["bun", "src/index.ts"]
    depends_on:
      - db

  # データベース (PostgreSQL + pgvector)
  db:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - "5432:5432" 
    environment:
      - POSTGRES_USER=blog_user
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=blog_db
    # メモリ4GB環境向けのチューニング
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c max_connections=20
    deploy:
      resources:
        limits:
          memory: 1024M  # コンテナの暴走を防ぐ防波堤
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
